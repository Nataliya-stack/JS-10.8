<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <!-- Tailwind CSS v4 -->
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  <style type="text/tailwindcss">
    body {             
      background-image: url("./img/bg3.png");
      background-repeat: no-repeat;
      background-position: center;
      background-size: cover;
      background-attachment: fixed;
      width: 100%; 
      max-width: 1200px; 
      margin: 0 auto;
      min-height: 100vh; 
      display: flex;
      flex-direction: column;
      align-items: center; 
      overflow-x: hidden;
      font-family: Cambria, Cochin, Georgia, Times, 'Times New Roman', serif;      
      padding: 0 16px; 
      box-sizing: border-box;
    }
  </style>  
  <link rel="shortcut icon" href="shopping-cart.svg" type="image/svg">
  <title>Tareas</title>
</head>

<body> 

  <h1 class="font-bold text-3xl md:text-6xl my-6 md:my-15 text-center text-cyan-950 px-2">
    Indica si la frase es palíndromo
  </h1>   

  <div class="bg-cyan-950 text-cyan-100 w-full md:w-2/4 p-6 md:p-10 rounded-lg box-border">
    <div class="flex flex-col md:flex-row justify-center items-center gap-4 md:gap-10 mb-6 text-xl md:text-2xl">
      <label for="input" class="text-center">Escribe algunas frases:</label>  
      <textarea id="input" rows="2" class="border-cyan-100 border-2 rounded-lg px-4 py-2 w-full text-cyan-950 bg-white resize-none" placeholder="escribe aquí..."></textarea>
    </div>

    <div class="flex justify-center text-xl md:text-2xl">    
      <button type="button" onclick="result()" class="bg-cyan-100 text-cyan-950 font-bold py-2 px-6 rounded-lg hover:bg-cyan-200 transition-colors cursor-pointer w-full md:w-auto">
        PRENSA AQUI
      </button>      
    </div>  

    <div>
      <h2 class="font-bold text-2xl md:text-4xl my-6 md:my-5 text-center text-cyan-100 px-2">
        Resultado:
      </h2>
      <p id="resultado" class="text-cyan-100 text-center text-xl md:text-2xl wrap-break-word px-4 py-2 bg-cyan-900 rounded-lg min-h-[50px] w-full"></p>
    </div>
  </div>

  <script src="./js/app.js"></script>
</body>

</html>
